<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Locker - Project G-6</title>
    
    <style>
        /* Overall Page Setup */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eaf5e9 0%, #e3f2fd 100%);
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Header Styling */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .logo h1 {
            margin: 0;
            color: #2e4a4d;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo p {
            margin: 0;
            font-size: 14px;
            color: #555;
            padding-left: 34px;
        }

        .team-name {
            font-size: 20px;
            font-weight: bold;
            color: #111;
        }

        /* Hero Section Styling */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .hero-text h2 {
            font-size: 36px;
            line-height: 1.2;
            color: #111;
            margin: 0;
        }

        .hero-image {
            width: 350px;
            height: 200px;
            background-color: #ccc;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Locker Section */
        .locker-section {
            text-align: center;
        }

        .locker-section h3 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .locker-container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        /* Locker Buttons (Available) */
        .locker-btn {
            background: linear-gradient(to bottom, #fdfdfd, #e9ecef);
            border: 1px solid #b0bec5;
            border-radius: 8px;
            width: 160px;
            height: 80px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 2px 0 rgba(255,255,255,0.8);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            transition: all 0.2s ease;
        }

        .locker-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.8);
        }

        /* Locker Buttons (Occupied/Disabled) */
        .locker-btn:disabled {
            background: linear-gradient(to bottom, #cfd8dc, #b0bec5);
            border: 1px solid #90a4ae;
            color: #546e7a;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Status Badges */
        .badge {
            position: absolute;
            top: 5px;
            right: 10px;
            background-color: #4caf50;
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge::after {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #fff;
            border-radius: 50%;
            display: inline-block;
        }

        /* Badge for unavailable lockers */
        .badge.unavailable {
            background-color: #78909c;
        }
        
        .badge.unavailable::after {
            display: none;
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* Modal Content Box */
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal-content h4 {
            margin: 0 0 5px 0;
            font-size: 18px;
        }

        .modal-content p.subtitle {
            margin: 0 0 20px 0;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        /* PIN Code Boxes */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .pin-digit {
            width: 40px;
            height: 50px;
            border: 1px solid #4a7c59;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: #111;
            background-color: #f9fbf9;
        }

        .modal-content p.instructions {
            font-size: 12px;
            color: #444;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .dismiss-btn {
            background-color: #4c8c54;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dismiss-btn:hover {
            background-color: #3b6e41;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <div class="logo">
            <h1>🍱 Food Locker</h1>
            <p>Fresh & Hygiene</p>
        </div>
        <div class="team-name">
            Engineering Team Project G-6
        </div>
    </div>

    <div class="hero">
        <div class="hero-text">
            <h2>Your Food is Secure<br>and Fresh<br>On Your Schedule</h2>
        </div>
        <div class="hero-image">
            <img src="PIC1.jpg.jpeg" alt="Man at locker">
        </div>
    </div>

    <div class="locker-section">
        <h3>Available Locker</h3>
        <div class="locker-container">
            <button class="locker-btn" onclick="openModal('A1')">
                <div class="badge">Available</div>
                Locker A1
            </button>
            
            <button class="locker-btn" disabled>
                <div class="badge unavailable">Occupied</div>
                Locker A2
            </button>
            
            <button class="locker-btn" disabled>
                <div class="badge unavailable">Occupied</div>
                Locker A3
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="pinModal">
        <div class="modal-content">
            <h4>UNIQUE LOCKER ACCESS PIN</h4>
            <p class="subtitle">FOR LOCKER <span id="displayLockerId"></span></p>
            
            <div class="pin-display">
                <div class="pin-digit" id="digit1">0</div>
                <div class="pin-digit" id="digit2">0</div>
                <div class="pin-digit" id="digit3">0</div>
                <div class="pin-digit" id="digit4">0</div>
                <div class="pin-digit" id="digit5">0</div>
                <div class="pin-digit" id="digit6">0</div>
            </div>
            
            <p class="instructions">
                Please use this code on the keypad of Locker <span id="instructionLockerId"></span>.<br>
                Code is valid for 30 minutes.
            </p>
            
            <button class="dismiss-btn" onclick="closeModal()">DISMISS</button>
        </div>
    </div>

    <script>
        // Function to generate the PIN and show the modal
        function openModal(lockerName) {
            // Update the locker IDs in the text
            document.getElementById('displayLockerId').innerText = lockerName;
            document.getElementById('instructionLockerId').innerText = lockerName;

            // Generate 6 random numbers
            for (let i = 1; i <= 6; i++) {
                let randomNumber = Math.floor(Math.random() * 10);
                document.getElementById('digit' + i).innerText = randomNumber;
            }

            // Show the modal
            document.getElementById('pinModal').style.display = 'flex';
        }

        // Function to hide the modal
        function closeModal() {
            document.getElementById('pinModal').style.display = 'none';
        }
    </script>

</body>

</html>
